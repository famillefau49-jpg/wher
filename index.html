<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Résistance</title>

<style>
body{margin:0;background:#111;color:white;font-family:Arial;text-align:center;}
.screen{display:none;padding:20px;}
.active{display:block;}

img{width:90%;max-width:400px;border-radius:10px;}

button{
padding:12px;margin:8px;
background:#2e7d32;color:white;
border:none;border-radius:8px;
font-weight:bold;
}

input{padding:10px;border-radius:8px;border:none;}

.flash{animation:flash 0.2s;}
@keyframes flash{0%{background:#b71c1c;}100%{background:#111;}}

/* MORPION */
#grid{display:grid;grid-template-columns:repeat(3,100px);gap:5px;justify-content:center;}
.cell{width:100px;height:100px;background:#333;display:flex;align-items:center;justify-content:center;font-size:40px;}

/* COFFRE */
.lock{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

.digit{
font-size:40px;
background:#222;
padding:15px;
border-radius:10px;
width:50px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="screen active" id="intro">
<h2>Pontain-l’Écluse</h2>
<img src="pont.png">
<button onclick="next('fermier')">Commencer</button>
</div>

<!-- MORSE -->
<div class="screen" id="fermier">
<h2>La ferme</h2>
<p>Décode :</p>
<p>.-.. -.-- -. -..-</p>
<input id="morse">
<button onclick="checkMorse()">Valider</button>
</div>

<!-- MORPION -->
<div class="screen" id="morpion">
<h2>Gagne contre l’ennemi</h2>
<div id="grid"></div>
<p id="status"></p>
</div>

<!-- FORET -->
<div class="screen" id="foret">
<img src="mot.png">
<p>_ C L _ S E</p>
<input id="repForet">
<button onclick="checkForet()">Valider</button>
</div>

<!-- SOLDAT -->
<div class="screen" id="soldat">
<p>T S A L D O</p>
<input id="repSoldat">
<button onclick="checkSoldat()">Valider</button>
</div>
