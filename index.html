<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Résistance</title>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial;}
.screen{display:none;padding:20px;}
.active{display:block;}

img{width:90%;max-width:500px;border-radius:10px;margin:10px;}

button{padding:12px;margin:6px;border:none;border-radius:8px;background:#2e7d32;color:white;}

.colorBox{width:60px;height:60px;display:inline-block;margin:5px;border-radius:10px;}

#timer{font-size:30px;color:red;}

.flash{animation:flash 0.3s;}
@keyframes flash{0%{background:red;}100%{background:black;}}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
}

#popupContent{
animation:zoomIn 0.5s ease;
}

#number{
font-size:80px;
text-shadow:0 0 20px yellow,0 0 40px orange;
animation:glow 1s infinite alternate;
}

@keyframes zoomIn{
from{transform:scale(0.3);}
to{transform:scale(1);}
}

@keyframes glow{
from{text-shadow:0 0 10px yellow;}
to{text-shadow:0 0 40px orange,0 0 60px yellow;}
}
</style>
</head>

<body>

<audio id="foundSound" src="2241.mp3"></audio>

<!-- INTRO -->
<div class="screen active" id="s0">
<h2>Mission Résistance</h2>
<img src="enfants.png">
<p>Vous arrivez à la ferme…</p>
<button onclick="next('s1')">Continuer</button>
</div>

<!-- MORSE -->
<div class="screen" id="s1">
<p>Message du fermier :</p>
<h2>.-.. -.-- -. -..-</h2>
<input id="q1"><br>
<button onclick="checkQ1()">Valider</button>
</div>

<!-- SOLDAT -->
<div class="screen" id="soldat">
<img src="z2.png">
<p>HALT ! Une grenade !</p>
<div id="timer">10</div>
<button onclick="grenade()">💣 Lancer</button>
<button onclick="fail()">🏃 Fuir</button>
</div>

<!-- ARBRE -->
<div class="screen" id="s2">
<p>Observe l’arbre… clique sur la gravure</p>

<div style="position:relative;display:inline-block;">
<img src="resiarb.png">

<div onclick="showPopup()" 
style="position:absolute;top:60%;left:40%;width:80px;height:80px;border:2px dashed white;">
</div>
</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
<div id="popupContent">
<h1 id="number">3</h1>
<button onclick="closePopup()">Continuer</button>
</div>
</div>

<!-- QUESTION -->
<div class="screen" id="s2q">
<p>Quel chiffre était gravé ?</p>
<input id="treeAnswer"><br>
<button onclick="checkTree()">Valider</button>
</div>

<!-- LETTRES -->
<div class="screen" id="s3">
<p>Reconstitue le mot :</p>

<button onclick="addLetter('S')">S</button>
<button onclick="addLetter('O')">O</button>
<button onclick="addLetter('L')">L</button>
<button onclick="addLetter('D')">D</button>
<button onclick="addLetter('A')">A</button>
<button onclick="addLetter('T')">T</button>

<p id="word"></p>

<button onclick="checkWord()">Valider</button>
</div>

<!-- MEMOIRE -->
<div class="screen" id="s4">
<p>Observe…</p>

<div id="sequence"></div>

<div>
<div class="colorBox" style="background:red;" onclick="clickColor('r')"></div>
<div class="colorBox" style="background:yellow;" onclick="clickColor('y')"></div>
<div class="colorBox" style="background:blue;" onclick="clickColor('b')"></div>
<div class="colorBox" style="background:green;" onclick="clickColor('g')"></div>
</div>

<p id="player"></p>

<button onclick="checkMemory()">Valider</button>
</div>

<!-- COFFRE -->
<div class="screen" id="s5">
<p>MOT + CHIFFRE</p>
<input id="final"><br>
<button onclick="checkFinal()">Ouvrir</button>
</div>

<!-- FIN -->
<div class="screen" id="s6">
<h2>Mission accomplie</h2>
<img src="final.png">
</div>

<script>

function next(id){
document.querySelector(".active").classList.remove("active");
document.getElementById(id).classList.add("active");

if(id==="s4"){
playerSeq=[];
document.getElementById("player").innerText="";
showSequence();
}
}

function error(){
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),200);
}

// MORSE
function checkQ1(){
if(q1.value.toLowerCase()=="lynx"){
startSoldat();
}else error();
}

// SOLDAT
let t=10,int;

function startSoldat(){
next("soldat");
t=10;
int=setInterval(()=>{
t--;
timer.innerText=t;
if(t<=0) fail();
},1000);
}

function grenade(){
clearInterval(int);
next("s2");
}

function fail(){
clearInterval(int);
alert("Trop lent !");
location.reload();
}

// POPUP
function showPopup(){
document.getElementById("popup").style.display="flex";
document.getElementById("foundSound").play();
}

function closePopup(){
document.getElementById("popup").style.display="none";
next("s2q");
}

function checkTree(){
if(treeAnswer.value=="3"){
next("s3");
}else error();
}

// LETTRES
let currentWord="";

function addLetter(l){
currentWord+=l;
document.getElementById("word").innerText=currentWord;
}

function checkWord(){
if(currentWord.toLowerCase()=="soldat"){
next("s4");
}else{
currentWord="";
document.getElementById("word").innerText="";
error();
}
}

// MEMOIRE
let seq=["r","y","b","g"];
let playerSeq=[];

function showSequence(){
let s=document.getElementById("sequence");
s.innerHTML="";
seq.forEach(c=>{
let d=document.createElement("div");
d.className="colorBox";
d.style.background=c=="r"?"red":c=="y"?"yellow":c=="b"?"blue":"green";
s.appendChild(d);
});
setTimeout(()=>{s.innerHTML="";},3000);
}

function clickColor(c){
playerSeq.push(c);
document.getElementById("player").innerText=playerSeq.join("-");
}

function checkMemory(){
if(playerSeq.join()==seq.join()){
next("s5");
}else{
playerSeq=[];
document.getElementById("player").innerText="";
error();
}
}

// FINAL
function checkFinal(){
if(final.value.toLowerCase()=="soldat3"){
next("s6");
}else error();
}

</script>

</body>
</html>
