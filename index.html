<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Résistance</title>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial;}
.screen{display:none;padding:20px;}
.active{display:block;}

img{width:90%;max-width:500px;border-radius:10px;margin:10px;}

button{padding:12px;margin:8px;background:#2e7d32;color:white;border:none;border-radius:8px;}

input{padding:10px;border-radius:8px;border:none;}

.zone{position:relative;display:inline-block;}
.click{position:absolute;}

#timer{font-size:30px;color:red;}

.flash{animation:flash 0.3s;}
@keyframes flash{0%{background:red;}100%{background:black;}}
</style>
</head>

<body>

<!-- SONS -->
<audio id="good" src="2241.mp3"></audio>
<audio id="bad" src="9334.mp3"></audio>
<audio id="tir" src="Sharp crack of a sniper rifle in a desolate urban environment.mp3"></audio>
<audio id="explosion" src="Whizzing sound of incoming artillery shells followed by a ground-shaking impact.mp3"></audio>

<!-- INTRO -->
<div class="screen active" id="s0">
<h2>MISSION RÉSISTANCE</h2>
<img src="enfants.png">
<p>Vous êtes les seuls capables d’agir…</p>
<button onclick="next('s1')">Commencer</button>
</div>

<!-- MORSE -->
<div class="screen" id="s1">
<p>Message radio :</p>
<button onclick="playMorse()">🔊 Écouter</button><br>
<input id="q1" placeholder="Mot"><br>
<button onclick="checkQ1()">Valider</button>
</div>

<!-- SOLDAT -->
<div class="screen" id="soldat">
<img src="z2.png">
<p>HALT !</p>
<div id="timer">10</div>
<button onclick="grenade()">💣 Lancer</button>
<button onclick="fail()">🏃 Fuir</button>
</div>

<!-- ARBRE -->
<div class="screen" id="s2">
<p>Trouve la gravure</p>
<div class="zone">
<img src="resiarb.png">
<div class="click" style="top:70%;left:40%;width:80px;height:80px;" onclick="foundTree()"></div>
</div>
</div>

<!-- FEUILLE -->
<div class="screen" id="s3">
<img src="feuille.png">
<p>Remets les lettres dans l’ordre</p>
<input id="q2"><br>
<button onclick="checkQ2()">Valider</button>
</div>

<!-- MEMOIRE -->
<div class="screen" id="s4">
<p>Mémorise la séquence</p>
<h2 id="sequence"></h2>
<button onclick="startMemory()">Voir</button><br>
<input id="memoryInput" placeholder="ex: rouge bleu vert"><br>
<button onclick="checkMemory()">Valider</button>
</div>

<!-- COFFRE -->
<div class="screen" id="s5">
<p>Entre le code du coffre</p>
<input id="final"><br>
<button onclick="checkFinal()">Valider</button>
</div>

<!-- FIN -->
<div class="screen" id="s6">
<h2>MISSION ACCOMPLIE</h2>
<img src="final.png">
<p>Message transmis</p>
</div>

<script>

// NAV
function next(id){
document.querySelector(".active").classList.remove("active");
document.getElementById(id).classList.add("active");
}

// AUDIO
function play(id){document.getElementById(id).play();}

// ERROR
function error(){
play("bad");
document.body.classList.add("flash");
setTimeout(()=>document.body.classList.remove("flash"),200);
}

// MORSE
async function playMorse(){
let dot=200,dash=600;
let seq=[".-..","-.--","-.","-..-"];
for(let l of seq){
for(let s of l){
beep(s=="."?dot:dash);
await new Promise(r=>setTimeout(r,300));
}
}
}

function beep(d){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+d/1000);
}

function checkQ1(){
if(q1.value.toLowerCase()=="lynx"){
play("good");
startSoldat();
}else error();
}

// SOLDAT
let t=10,int;

function startSoldat(){
next("soldat");
int=setInterval(()=>{
t--;
timer.innerText=t;
if(t<=0) fail();
},1000);
}

function grenade(){
clearInterval(int);
play("explosion");
setTimeout(()=>next("s2"),800);
}

function fail(){
clearInterval(int);
play("tir");
error();
setTimeout(()=>location.reload(),800);
}

// ARBRE
function foundTree(){
play("good");
alert("Tu vois le chiffre 3");
next("s3");
}

// FEUILLE
function checkQ2(){
if(q2.value.toLowerCase()=="soldat"){
play("good");
next("s4");
}else error();
}

// MEMOIRE
let seq="rouge jaune bleu vert";

function startMemory(){
sequence.innerText=seq;
setTimeout(()=>sequence.innerText="",3000);
}

function checkMemory(){
if(memoryInput.value.toLowerCase()==seq){
play("good");
alert("MEMOIRE");
next("s5");
}else error();
}

// FINAL
function checkFinal(){
let val=final.value.toLowerCase();
if(val=="soldat3"){
play("good");
next("s6");
}else error();
}

</script>

</body>
</html>
